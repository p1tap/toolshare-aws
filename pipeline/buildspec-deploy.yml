version: 0.2

# STAGE env var ("staging" or "prod") is set per pipeline-stage action override.

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - pip install --quiet aws-sam-cli
      - npm ci
  build:
    commands:
      - test -n "$STAGE"
      - sam build
      - sam deploy --config-env "$STAGE" --no-confirm-changeset --no-fail-on-empty-changeset
      # Web tier: VITE_ vars are baked at build time, so build per stage from
      # the live stack outputs, then atomic sync + edge invalidation.
      # CodeBuild gives each list item its own shell. Keep output lookup,
      # helper function, build, and publish in one block so values persist.
      - |
        set -eu
        outputs=$(aws cloudformation describe-stacks \
          --stack-name "toolshare-$STAGE" --region ap-southeast-1 \
          --query "Stacks[0].Outputs" --output json)
        get() { echo "$outputs" | jq -r ".[] | select(.OutputKey==\"$1\") | .OutputValue"; }
        api_url=$(get ApiUrl)
        user_pool_id=$(get UserPoolId)
        client_id=$(get UserPoolClientId)
        web_bucket=$(get WebBucketName)
        distribution_id=$(get WebDistributionId)
        test -n "$api_url" && test -n "$user_pool_id" && test -n "$client_id"
        test -n "$web_bucket" && test -n "$distribution_id"
        cd web
        npm ci
        VITE_API_MODE=real \
        VITE_API_URL="$api_url" \
        VITE_USER_POOL_ID="$user_pool_id" \
        VITE_CLIENT_ID="$client_id" \
        VITE_AWS_REGION=ap-southeast-1 \
          npm run build
        aws s3 sync dist "s3://$web_bucket" --delete
        aws cloudfront create-invalidation \
          --distribution-id "$distribution_id" --paths "/*"
