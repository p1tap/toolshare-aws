version: 0.2

# STAGE env var ("staging" or "prod") is set per pipeline-stage action override.
# Looks up the live stack's API URL rather than trusting a passed artifact,
# so the smoke gate always tests what's actually deployed.

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - npm ci
  build:
    commands:
      - test -n "$STAGE"
      - >
        API_URL=$(aws cloudformation describe-stacks
        --stack-name "toolshare-$STAGE"
        --region ap-southeast-1
        --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue"
        --output text)
      - export API_URL
      - echo "Smoke testing $API_URL"
      - npm run smoke
