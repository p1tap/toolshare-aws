AWSTemplateFormatVersion: '2010-09-09'
Description: >
  ToolShare CI/CD pipeline: GitHub -> test -> deploy staging -> smoke gate ->
  manual approval -> deploy prod -> smoke gate. CodePipeline V2 (pay-per-use,
  no flat monthly fee) + CodeBuild (per-build-minute). Everything here is
  either free-tier or fractions of a cent per run; nothing idles hourly.

Parameters:
  GitHubConnectionArn:
    Type: String
    Description: codeconnections ARN (ap-southeast-1), authorized to GitHub.
  RepositoryId:
    Type: String
    Default: p1tap/toolshare-aws
  BranchName:
    Type: String
    Default: main
  AccountId:
    Type: String
    Default: '361769555517'

Resources:
  # --- Buckets -------------------------------------------------------------

  PipelineArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub toolshare-pipeline-artifacts-${AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: expire-old-artifacts
            Status: Enabled
            ExpirationInDays: 14

  SamArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub toolshare-sam-artifacts-${AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: expire-old-packages
            Status: Enabled
            ExpirationInDays: 14

  # --- CodeBuild service role (test / deploy / smoke share one role) -------

  CodeBuildServiceRole:
    Type: AWS::IAM::Role
    # cfn-lint 1.53's IAM catalog still validates API Gateway V1 actions
    # here and does not know the V2 TagResource/UntagResource actions.
    Metadata:
      cfn-lint:
        config:
          ignore_checks: [W3037]
    Properties:
      RoleName: toolshare-codebuild-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: toolshare-codebuild-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: Logs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !Sub arn:aws:logs:ap-southeast-1:${AccountId}:log-group:/aws/codebuild/toolshare-*
                  - !Sub arn:aws:logs:ap-southeast-1:${AccountId}:log-group:/aws/codebuild/toolshare-*:*

              - Sid: PipelineArtifacts
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketVersioning
                Resource:
                  - !Sub arn:aws:s3:::toolshare-pipeline-artifacts-${AccountId}
                  - !Sub arn:aws:s3:::toolshare-pipeline-artifacts-${AccountId}/*

              - Sid: SamArtifacts
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::toolshare-sam-artifacts-${AccountId}
                  - !Sub arn:aws:s3:::toolshare-sam-artifacts-${AccountId}/*

              - Sid: AppBuckets
                Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:PutBucketPolicy
                  - s3:DeleteBucketPolicy
                  - s3:PutBucketPublicAccessBlock
                  - s3:PutBucketCORS
                  - s3:PutBucketNotification
                  - s3:GetBucketPolicy
                  - s3:GetBucketNotification
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:PutLifecycleConfiguration
                Resource:
                  - arn:aws:s3:::toolshare-images-*
                  - arn:aws:s3:::toolshare-images-*/*

              - Sid: WebDeploy
                Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:PutBucketPolicy
                  - s3:DeleteBucketPolicy
                  - s3:GetBucketPolicy
                  - s3:PutBucketPublicAccessBlock
                  - s3:ListBucket
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource:
                  - arn:aws:s3:::toolshare-web-*
                  - arn:aws:s3:::toolshare-web-*/*

              - Sid: WebCloudFront
                Effect: Allow
                Action:
                  # distribution lifecycle is managed via CloudFormation; the
                  # pipeline itself only invalidates. CloudFront ARNs don't
                  # support name-prefix scoping usefully, hence the account
                  # wildcard on our own distributions.
                  - cloudfront:CreateDistribution
                  - cloudfront:UpdateDistribution
                  - cloudfront:DeleteDistribution
                  - cloudfront:GetDistribution
                  - cloudfront:GetDistributionConfig
                  - cloudfront:TagResource
                  - cloudfront:UntagResource
                  # resolving !GetAtt Function.FunctionMetadata.FunctionARN
                  # during distribution creation reads the function's tags
                  - cloudfront:ListTagsForResource
                  - cloudfront:CreateInvalidation
                  - cloudfront:CreateOriginAccessControl
                  - cloudfront:GetOriginAccessControl
                  - cloudfront:GetOriginAccessControlConfig
                  - cloudfront:UpdateOriginAccessControl
                  - cloudfront:DeleteOriginAccessControl
                  - cloudfront:CreateFunction
                  - cloudfront:UpdateFunction
                  - cloudfront:DeleteFunction
                  - cloudfront:DescribeFunction
                  - cloudfront:GetFunction
                  - cloudfront:PublishFunction
                Resource: "*"

              - Sid: Messaging
                Effect: Allow
                Action:
                  - sns:CreateTopic
                  - sns:DeleteTopic
                  - sns:GetTopicAttributes
                  - sns:GetSubscriptionAttributes
                  - sns:SetTopicAttributes
                  - sns:Subscribe
                  - sns:Unsubscribe
                  - sns:ListSubscriptionsByTopic
                  - sns:TagResource
                Resource:
                  - !Sub arn:aws:sns:ap-southeast-1:${AccountId}:toolshare-*

              - Sid: Queues
                Effect: Allow
                Action:
                  - sqs:CreateQueue
                  - sqs:DeleteQueue
                  - sqs:GetQueueAttributes
                  - sqs:SetQueueAttributes
                  - sqs:TagQueue
                Resource:
                  - !Sub arn:aws:sqs:ap-southeast-1:${AccountId}:toolshare-*

              - Sid: LambdaEventSourceMappings
                Effect: Allow
                Action:
                  - lambda:CreateEventSourceMapping
                  - lambda:DeleteEventSourceMapping
                  - lambda:GetEventSourceMapping
                  - lambda:UpdateEventSourceMapping
                Resource: '*'

              - Sid: StepFunctionsSaga
                Effect: Allow
                Action:
                  - states:CreateStateMachine
                  - states:DeleteStateMachine
                  - states:UpdateStateMachine
                  - states:DescribeStateMachine
                  - states:ListTagsForResource
                  - states:TagResource
                Resource:
                  - !Sub arn:aws:states:ap-southeast-1:${AccountId}:stateMachine:toolshare-*

              - Sid: PaymentSecret
                Effect: Allow
                Action:
                  - secretsmanager:CreateSecret
                  - secretsmanager:DeleteSecret
                  - secretsmanager:DescribeSecret
                  - secretsmanager:GetSecretValue
                  - secretsmanager:TagResource
                  - secretsmanager:UpdateSecret
                Resource:
                  - !Sub arn:aws:secretsmanager:ap-southeast-1:${AccountId}:secret:toolshare/*

              # The secret's GenerateSecretString needs a random password,
              # and this action doesn't support resource-level scoping.
              - Sid: PaymentSecretRandomPassword
                Effect: Allow
                Action:
                  - secretsmanager:GetRandomPassword
                Resource: "*"

              - Sid: EventBridgeRules
                Effect: Allow
                Action:
                  - events:PutRule
                  - events:DeleteRule
                  - events:DescribeRule
                  - events:ListTargetsByRule
                  - events:ListTagsForResource
                  - events:PutTargets
                  - events:RemoveTargets
                  - events:TagResource
                Resource:
                  - !Sub arn:aws:events:ap-southeast-1:${AccountId}:rule/toolshare-*

              - Sid: CognitoUserPool
                Effect: Allow
                Action:
                  - cognito-idp:CreateUserPool
                  - cognito-idp:DeleteUserPool
                  - cognito-idp:UpdateUserPool
                  - cognito-idp:DescribeUserPool
                  - cognito-idp:CreateUserPoolClient
                  - cognito-idp:DeleteUserPoolClient
                  - cognito-idp:UpdateUserPoolClient
                  - cognito-idp:DescribeUserPoolClient
                  - cognito-idp:CreateGroup
                  - cognito-idp:DeleteGroup
                  - cognito-idp:GetGroup
                  - cognito-idp:TagResource
                Resource:
                  - !Sub arn:aws:cognito-idp:ap-southeast-1:${AccountId}:userpool/*

              - Sid: StateMachineLogGroup
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:DeleteLogGroup
                  - logs:PutRetentionPolicy
                Resource:
                  - !Sub arn:aws:logs:ap-southeast-1:${AccountId}:log-group:/aws/vendedlogs/states/toolshare-*
                  - !Sub arn:aws:logs:ap-southeast-1:${AccountId}:log-group:/aws/vendedlogs/states/toolshare-*:*

              # CloudWatch Logs actions that don't support resource-level
              # scoping: DescribeLogGroups resolves the log group's Arn GetAtt,
              # and the log-delivery / resource-policy actions wire up Step
              # Functions vended logging. IAM rejects an ARN here, so "*".
              - Sid: LogsAccountLevel
                Effect: Allow
                Action:
                  - logs:DescribeLogGroups
                  - logs:DescribeIndexPolicies
                  - logs:DescribeResourcePolicies
                  - logs:PutResourcePolicy
                  - logs:DeleteResourcePolicy
                  - logs:CreateLogDelivery
                  - logs:GetLogDelivery
                  - logs:UpdateLogDelivery
                  - logs:DeleteLogDelivery
                  - logs:ListLogDeliveries
                Resource: "*"

              - Sid: CloudFormationApp
                Effect: Allow
                Action:
                  - cloudformation:CreateChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DeleteChangeSet
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStackResource
                  - cloudformation:DescribeStackResources
                  - cloudformation:GetTemplate
                  - cloudformation:GetTemplateSummary
                  - cloudformation:ListStackResources
                  - cloudformation:ValidateTemplate
                Resource:
                  - !Sub arn:aws:cloudformation:ap-southeast-1:${AccountId}:stack/toolshare-staging/*
                  - !Sub arn:aws:cloudformation:ap-southeast-1:${AccountId}:stack/toolshare-prod/*

              # SAM's Transform: AWS::Serverless-2016-10-31 expands into a
              # nested changeset against this AWS-owned macro resource,
              # separate from (and in addition to) the app stack ARNs above.
              - Sid: SamTransform
                Effect: Allow
                Action:
                  - cloudformation:CreateChangeSet
                Resource:
                  - arn:aws:cloudformation:ap-southeast-1:aws:transform/Serverless-2016-10-31

              - Sid: Lambda
                Effect: Allow
                Action:
                  - lambda:CreateFunction
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - lambda:GetFunction
                  - lambda:GetFunctionConfiguration
                  - lambda:GetFunctionCodeSigningConfig
                  - lambda:GetRuntimeManagementConfig
                  - lambda:GetProvisionedConcurrencyConfig
                  - lambda:GetPolicy
                  - lambda:ListTags
                  - lambda:DeleteFunction
                  - lambda:AddPermission
                  - lambda:RemovePermission
                  - lambda:TagResource
                  - lambda:PublishVersion
                  - lambda:CreateAlias
                  - lambda:UpdateAlias
                  - lambda:DeleteAlias
                  - lambda:GetAlias
                  - lambda:ListVersionsByFunction
                Resource:
                  - !Sub arn:aws:lambda:ap-southeast-1:${AccountId}:function:toolshare-*

              - Sid: DynamoDB
                Effect: Allow
                Action:
                  - dynamodb:CreateTable
                  - dynamodb:UpdateTable
                  - dynamodb:DeleteTable
                  - dynamodb:DescribeTable
                  - dynamodb:TagResource
                Resource:
                  - !Sub arn:aws:dynamodb:ap-southeast-1:${AccountId}:table/toolshare-tools-*
                  - !Sub arn:aws:dynamodb:ap-southeast-1:${AccountId}:table/toolshare-tools-*/index/*
                  - !Sub arn:aws:dynamodb:ap-southeast-1:${AccountId}:table/toolshare-rentals-*
                  - !Sub arn:aws:dynamodb:ap-southeast-1:${AccountId}:table/toolshare-rentals-*/index/*

              - Sid: ApiGatewayV2
                Effect: Allow
                Action:
                  - apigateway:GET
                  - apigateway:POST
                  - apigateway:PUT
                  - apigateway:DELETE
                  - apigateway:PATCH
                  - apigateway:TagResource
                  - apigateway:UntagResource
                Resource:
                  - arn:aws:apigateway:ap-southeast-1::/apis
                  - arn:aws:apigateway:ap-southeast-1::/apis/*
                  # creating/updating the HTTP API tags it, which is a POST
                  # against the /tags/{resourceArn} path, not /apis
                  - arn:aws:apigateway:ap-southeast-1::/tags/*

              - Sid: CodeDeployCanary
                Effect: Allow
                Action:
                  - codedeploy:CreateApplication
                  - codedeploy:DeleteApplication
                  - codedeploy:GetApplication
                  - codedeploy:CreateDeploymentGroup
                  - codedeploy:UpdateDeploymentGroup
                  - codedeploy:DeleteDeploymentGroup
                  - codedeploy:GetDeploymentGroup
                  - codedeploy:CreateDeployment
                  - codedeploy:GetDeployment
                  - codedeploy:GetDeploymentConfig
                  - codedeploy:RegisterApplicationRevision
                  - codedeploy:ListApplications
                  - codedeploy:ListDeploymentGroups
                  - codedeploy:TagResource
                # CodeDeploy application/deployment-group ARNs aren't
                # knowable before SAM creates them on first deploy, same
                # constraint as the ApiGatewayV2 statement above.
                Resource: '*'

              - Sid: CloudWatchAlarmsForCanary
                Effect: Allow
                Action:
                  - cloudwatch:PutMetricAlarm
                  - cloudwatch:DeleteAlarms
                  - cloudwatch:DescribeAlarms
                Resource:
                  - !Sub arn:aws:cloudwatch:ap-southeast-1:${AccountId}:alarm:toolshare-*

              - Sid: IamForFunctionRoles
                Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRolePolicy
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:TagRole
                Resource:
                  - !Sub arn:aws:iam::${AccountId}:role/toolshare-*

              - Sid: PassRoleToLambda
                Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !Sub arn:aws:iam::${AccountId}:role/toolshare-*
                Condition:
                  StringEquals:
                    iam:PassedToService: lambda.amazonaws.com

              - Sid: PassRoleToCodeDeploy
                Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !Sub arn:aws:iam::${AccountId}:role/toolshare-*
                Condition:
                  StringEquals:
                    iam:PassedToService: codedeploy.amazonaws.com

              - Sid: PassRoleToStates
                Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !Sub arn:aws:iam::${AccountId}:role/toolshare-*
                Condition:
                  StringEquals:
                    iam:PassedToService: states.amazonaws.com

              - Sid: ReadStackOutputsForSmoke
                Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                Resource: '*'

  # --- CodeBuild projects ---------------------------------------------------

  TestProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: toolshare-test
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
      Source:
        Type: CODEPIPELINE
        BuildSpec: pipeline/buildspec-test.yml
      TimeoutInMinutes: 10

  DeployProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: toolshare-deploy
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
      Source:
        Type: CODEPIPELINE
        BuildSpec: pipeline/buildspec-deploy.yml
      # First-time CloudFront creation dominates the deploy; keep enough room
      # for SAM plus the web build/sync without weakening any release gate.
      TimeoutInMinutes: 30

  SmokeTestProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: toolshare-smoke
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
      Source:
        Type: CODEPIPELINE
        BuildSpec: pipeline/buildspec-smoke.yml
      TimeoutInMinutes: 10

  E2eProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: toolshare-e2e
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
      Source:
        Type: CODEPIPELINE
        BuildSpec: pipeline/buildspec-e2e.yml
      TimeoutInMinutes: 15

  # --- CodePipeline service role --------------------------------------------

  PipelineServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: toolshare-pipeline-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: toolshare-pipeline-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: Artifacts
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketVersioning
                Resource:
                  - !Sub arn:aws:s3:::toolshare-pipeline-artifacts-${AccountId}
                  - !Sub arn:aws:s3:::toolshare-pipeline-artifacts-${AccountId}/*
              - Sid: UseGitHubConnection
                Effect: Allow
                Action: codestar-connections:UseConnection
                Resource: !Ref GitHubConnectionArn
              - Sid: RunCodeBuild
                Effect: Allow
                Action:
                  - codebuild:StartBuild
                  - codebuild:BatchGetBuilds
                Resource:
                  - !GetAtt TestProject.Arn
                  - !GetAtt DeployProject.Arn
                  - !GetAtt SmokeTestProject.Arn
                  - !GetAtt E2eProject.Arn

  # --- Pipeline --------------------------------------------------------------

  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: toolshare-pipeline
      PipelineType: V2
      RoleArn: !GetAtt PipelineServiceRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref PipelineArtifactBucket
      Stages:
        - Name: Source
          Actions:
            - Name: GitHub
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: '1'
              Configuration:
                ConnectionArn: !Ref GitHubConnectionArn
                FullRepositoryId: !Ref RepositoryId
                BranchName: !Ref BranchName
              OutputArtifacts:
                - Name: SourceOutput

        - Name: Test
          Actions:
            - Name: RunUnitTests
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              InputArtifacts:
                - Name: SourceOutput
              Configuration:
                ProjectName: !Ref TestProject
              RunOrder: 1
            - Name: RunBrowserE2E
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              InputArtifacts:
                - Name: SourceOutput
              Configuration:
                ProjectName: !Ref E2eProject
              RunOrder: 1

        - Name: DeployStaging
          Actions:
            - Name: Deploy
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              InputArtifacts:
                - Name: SourceOutput
              Configuration:
                ProjectName: !Ref DeployProject
                EnvironmentVariables: '[{"name":"STAGE","value":"staging","type":"PLAINTEXT"}]'

        - Name: SmokeTestStaging
          Actions:
            - Name: Smoke
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              InputArtifacts:
                - Name: SourceOutput
              Configuration:
                ProjectName: !Ref SmokeTestProject
                EnvironmentVariables: '[{"name":"STAGE","value":"staging","type":"PLAINTEXT"}]'

        - Name: PromoteToProd
          Actions:
            - Name: ManualApproval
              ActionTypeId:
                Category: Approval
                Owner: AWS
                Provider: Manual
                Version: '1'
              Configuration:
                CustomData: >-
                  Staging deployed and passed the smoke gate. Approve to
                  deploy the same artifact to prod.

        - Name: DeployProd
          Actions:
            - Name: Deploy
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              InputArtifacts:
                - Name: SourceOutput
              Configuration:
                ProjectName: !Ref DeployProject
                EnvironmentVariables: '[{"name":"STAGE","value":"prod","type":"PLAINTEXT"}]'

        - Name: SmokeTestProd
          Actions:
            - Name: Smoke
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              InputArtifacts:
                - Name: SourceOutput
              Configuration:
                ProjectName: !Ref SmokeTestProject
                EnvironmentVariables: '[{"name":"STAGE","value":"prod","type":"PLAINTEXT"}]'

Outputs:
  PipelineName:
    Value: !Ref Pipeline
  ArtifactBucket:
    Value: !Ref PipelineArtifactBucket
  SamArtifactsBucket:
    Value: !Ref SamArtifactsBucket
