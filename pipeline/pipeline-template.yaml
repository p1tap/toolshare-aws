AWSTemplateFormatVersion: '2010-09-09'
Description: >
  ToolShare CI/CD pipeline: GitHub -> test -> deploy staging -> smoke gate ->
  manual approval -> deploy prod -> smoke gate. CodePipeline V2 (pay-per-use,
  no flat monthly fee) + CodeBuild (per-build-minute). Everything here is
  either free-tier or fractions of a cent per run; nothing idles hourly.

Parameters:
  GitHubConnectionArn:
    Type: String
    Description: codeconnections ARN (ap-southeast-1), authorized to GitHub.
  RepositoryId:
    Type: String
    Default: p1tap/toolshare-aws
  BranchName:
    Type: String
    Default: main
  AccountId:
    Type: String
    Default: '115568633446'

Resources:
  # --- Buckets -------------------------------------------------------------

  PipelineArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub toolshare-pipeline-artifacts-${AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: expire-old-artifacts
            Status: Enabled
            ExpirationInDays: 14

  SamArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub toolshare-sam-artifacts-${AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: expire-old-packages
            Status: Enabled
            ExpirationInDays: 14

  # --- CodeBuild service role (test / deploy / smoke share one role) -------

  CodeBuildServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: toolshare-codebuild-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: toolshare-codebuild-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: Logs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !Sub arn:aws:logs:ap-southeast-1:${AccountId}:log-group:/aws/codebuild/toolshare-*
                  - !Sub arn:aws:logs:ap-southeast-1:${AccountId}:log-group:/aws/codebuild/toolshare-*:*

              - Sid: PipelineArtifacts
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketVersioning
                Resource:
                  - !Sub arn:aws:s3:::toolshare-pipeline-artifacts-${AccountId}
                  - !Sub arn:aws:s3:::toolshare-pipeline-artifacts-${AccountId}/*

              - Sid: SamArtifacts
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::toolshare-sam-artifacts-${AccountId}
                  - !Sub arn:aws:s3:::toolshare-sam-artifacts-${AccountId}/*

              - Sid: AppBuckets
                Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:PutBucketPolicy
                  - s3:PutBucketPublicAccessBlock
                  - s3:PutBucketCORS
                  - s3:GetBucketPolicy
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:PutLifecycleConfiguration
                Resource:
                  - !Sub arn:aws:s3:::toolshare-images-*
                  - !Sub arn:aws:s3:::toolshare-images-*/*

              - Sid: CloudFormationApp
                Effect: Allow
                Action:
                  - cloudformation:CreateChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DeleteChangeSet
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStackResource
                  - cloudformation:DescribeStackResources
                  - cloudformation:GetTemplate
                  - cloudformation:GetTemplateSummary
                  - cloudformation:ListStackResources
                  - cloudformation:ValidateTemplate
                Resource:
                  - !Sub arn:aws:cloudformation:ap-southeast-1:${AccountId}:stack/toolshare-staging/*
                  - !Sub arn:aws:cloudformation:ap-southeast-1:${AccountId}:stack/toolshare-prod/*

              - Sid: Lambda
                Effect: Allow
                Action:
                  - lambda:CreateFunction
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - lambda:GetFunction
                  - lambda:GetFunctionConfiguration
                  - lambda:DeleteFunction
                  - lambda:AddPermission
                  - lambda:RemovePermission
                  - lambda:TagResource
                  - lambda:PublishVersion
                  - lambda:CreateAlias
                  - lambda:UpdateAlias
                  - lambda:GetAlias
                  - lambda:ListVersionsByFunction
                Resource:
                  - !Sub arn:aws:lambda:ap-southeast-1:${AccountId}:function:toolshare-*

              - Sid: DynamoDB
                Effect: Allow
                Action:
                  - dynamodb:CreateTable
                  - dynamodb:UpdateTable
                  - dynamodb:DeleteTable
                  - dynamodb:DescribeTable
                  - dynamodb:TagResource
                Resource:
                  - !Sub arn:aws:dynamodb:ap-southeast-1:${AccountId}:table/toolshare-tools-*
                  - !Sub arn:aws:dynamodb:ap-southeast-1:${AccountId}:table/toolshare-tools-*/index/*

              - Sid: ApiGatewayV2
                Effect: Allow
                Action:
                  - apigateway:GET
                  - apigateway:POST
                  - apigateway:PUT
                  - apigateway:DELETE
                  - apigateway:PATCH
                Resource:
                  - !Sub arn:aws:apigateway:ap-southeast-1::/apis
                  - !Sub arn:aws:apigateway:ap-southeast-1::/apis/*

              - Sid: IamForFunctionRoles
                Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRolePolicy
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:TagRole
                Resource:
                  - !Sub arn:aws:iam::${AccountId}:role/toolshare-*

              - Sid: PassRoleToLambda
                Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !Sub arn:aws:iam::${AccountId}:role/toolshare-*
                Condition:
                  StringEquals:
                    iam:PassedToService: lambda.amazonaws.com

              - Sid: ReadStackOutputsForSmoke
                Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                Resource: '*'

  # --- CodeBuild projects ---------------------------------------------------

  TestProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: toolshare-test
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
      Source:
        Type: CODEPIPELINE
        BuildSpec: pipeline/buildspec-test.yml
      TimeoutInMinutes: 10

  DeployProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: toolshare-deploy
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
      Source:
        Type: CODEPIPELINE
        BuildSpec: pipeline/buildspec-deploy.yml
      TimeoutInMinutes: 15

  SmokeTestProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: toolshare-smoke
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
      Source:
        Type: CODEPIPELINE
        BuildSpec: pipeline/buildspec-smoke.yml
      TimeoutInMinutes: 10

  # --- CodePipeline service role --------------------------------------------

  PipelineServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: toolshare-pipeline-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: toolshare-pipeline-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: Artifacts
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketVersioning
                Resource:
                  - !Sub arn:aws:s3:::toolshare-pipeline-artifacts-${AccountId}
                  - !Sub arn:aws:s3:::toolshare-pipeline-artifacts-${AccountId}/*
              - Sid: UseGitHubConnection
                Effect: Allow
                Action: codestar-connections:UseConnection
                Resource: !Ref GitHubConnectionArn
              - Sid: RunCodeBuild
                Effect: Allow
                Action:
                  - codebuild:StartBuild
                  - codebuild:BatchGetBuilds
                Resource:
                  - !GetAtt TestProject.Arn
                  - !GetAtt DeployProject.Arn
                  - !GetAtt SmokeTestProject.Arn

  # --- Pipeline --------------------------------------------------------------

  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: toolshare-pipeline
      PipelineType: V2
      RoleArn: !GetAtt PipelineServiceRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref PipelineArtifactBucket
      Stages:
        - Name: Source
          Actions:
            - Name: GitHub
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: '1'
              Configuration:
                ConnectionArn: !Ref GitHubConnectionArn
                FullRepositoryId: !Ref RepositoryId
                BranchName: !Ref BranchName
              OutputArtifacts:
                - Name: SourceOutput

        - Name: Test
          Actions:
            - Name: RunUnitTests
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              InputArtifacts:
                - Name: SourceOutput
              Configuration:
                ProjectName: !Ref TestProject

        - Name: DeployStaging
          Actions:
            - Name: Deploy
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              InputArtifacts:
                - Name: SourceOutput
              Configuration:
                ProjectName: !Ref DeployProject
                EnvironmentVariables: '[{"name":"STAGE","value":"staging","type":"PLAINTEXT"}]'

        - Name: SmokeTestStaging
          Actions:
            - Name: Smoke
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              InputArtifacts:
                - Name: SourceOutput
              Configuration:
                ProjectName: !Ref SmokeTestProject
                EnvironmentVariables: '[{"name":"STAGE","value":"staging","type":"PLAINTEXT"}]'

        - Name: PromoteToProd
          Actions:
            - Name: ManualApproval
              ActionTypeId:
                Category: Approval
                Owner: AWS
                Provider: Manual
                Version: '1'
              Configuration:
                CustomData: >-
                  Staging deployed and passed the smoke gate. Approve to
                  deploy the same artifact to prod.

        - Name: DeployProd
          Actions:
            - Name: Deploy
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              InputArtifacts:
                - Name: SourceOutput
              Configuration:
                ProjectName: !Ref DeployProject
                EnvironmentVariables: '[{"name":"STAGE","value":"prod","type":"PLAINTEXT"}]'

        - Name: SmokeTestProd
          Actions:
            - Name: Smoke
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              InputArtifacts:
                - Name: SourceOutput
              Configuration:
                ProjectName: !Ref SmokeTestProject
                EnvironmentVariables: '[{"name":"STAGE","value":"prod","type":"PLAINTEXT"}]'

Outputs:
  PipelineName:
    Value: !Ref Pipeline
  ArtifactBucket:
    Value: !Ref PipelineArtifactBucket
  SamArtifactsBucket:
    Value: !Ref SamArtifactsBucket
