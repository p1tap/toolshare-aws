# CI/CD: test -> deploy staging -> smoke gate -> manual approval -> deploy
# prod -> smoke gate. Auth is OIDC role assumption (pipeline/github-oidc.yaml)
# so no AWS keys are stored in GitHub. The prod gate is the `production`
# environment's required-reviewer protection rule.
#
# This replaced the CodePipeline/CodeBuild stack (pipeline-template.yaml)
# after AWS declined to lift the account's CodeBuild concurrency quota of 0;
# the CodeDeploy canary + auto-rollback is untouched since sam deploy
# triggers it, not the pipeline runner.

name: pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ap-southeast-1
  ROLE_ARN: arn:aws:iam::115568633446:role/toolshare-github-actions-role

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json
      - run: npm ci
      - run: npm test
      # Web tier: typecheck + build + unit tests
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web
      - run: npm test
        working-directory: web
      # Lint every CloudFormation/SAM template before anything deploys —
      # a template error caught here costs seconds, not a failed stack.
      - run: pipx run cfn-lint template.yaml pipeline/github-oidc.yaml pipeline/pipeline-template.yaml

  e2e:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npx playwright install --with-deps chromium
        working-directory: web
      # Browser E2E runs entirely against mock mode — no AWS involved, so it
      # rehearses the golden path (signup -> rent -> checkout-fail/compensate
      # -> retry -> return) on every push, freeze or no freeze.
      - run: npm run test:e2e
        working-directory: web
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

  deploy-staging:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - run: sam build
      - run: sam deploy --config-env staging --no-confirm-changeset --no-fail-on-empty-changeset
      # Web tier: VITE_ vars are baked at build time, so build per stage
      # from the live stack outputs, then atomic sync + edge invalidation.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: build and publish web (staging)
        run: |
          outputs=$(aws cloudformation describe-stacks --stack-name toolshare-staging \
            --region "$AWS_REGION" --query "Stacks[0].Outputs" --output json)
          get() { echo "$outputs" | jq -r ".[] | select(.OutputKey==\"$1\") | .OutputValue"; }
          cd web && npm ci
          VITE_API_MODE=real \
          VITE_API_URL="$(get ApiUrl)" \
          VITE_USER_POOL_ID="$(get UserPoolId)" \
          VITE_CLIENT_ID="$(get UserPoolClientId)" \
          VITE_AWS_REGION="$AWS_REGION" \
            npm run build
          aws s3 sync dist "s3://$(get WebBucketName)" --delete
          aws cloudfront create-invalidation --distribution-id "$(get WebDistributionId)" --paths "/*"

  smoke-staging:
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - run: npm ci
      # Look up the live stack's API URL rather than trusting a passed
      # artifact, so the smoke gate always tests what's actually deployed.
      - run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name toolshare-staging \
            --region "$AWS_REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)
          echo "Smoke testing $API_URL"
          API_URL="$API_URL" npm run smoke

  deploy-prod:
    needs: smoke-staging
    runs-on: ubuntu-latest
    # The `production` environment carries a required-reviewer protection
    # rule (GitHub repo Settings -> Environments), which pauses this job
    # until manually approved.
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - run: sam build
      - run: sam deploy --config-env prod --no-confirm-changeset --no-fail-on-empty-changeset
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: build and publish web (prod)
        run: |
          outputs=$(aws cloudformation describe-stacks --stack-name toolshare-prod \
            --region "$AWS_REGION" --query "Stacks[0].Outputs" --output json)
          get() { echo "$outputs" | jq -r ".[] | select(.OutputKey==\"$1\") | .OutputValue"; }
          cd web && npm ci
          VITE_API_MODE=real \
          VITE_API_URL="$(get ApiUrl)" \
          VITE_USER_POOL_ID="$(get UserPoolId)" \
          VITE_CLIENT_ID="$(get UserPoolClientId)" \
          VITE_AWS_REGION="$AWS_REGION" \
            npm run build
          aws s3 sync dist "s3://$(get WebBucketName)" --delete
          aws cloudfront create-invalidation --distribution-id "$(get WebDistributionId)" --paths "/*"

  smoke-prod:
    needs: deploy-prod
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - run: npm ci
      - run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name toolshare-prod \
            --region "$AWS_REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)
          echo "Smoke testing $API_URL"
          API_URL="$API_URL" npm run smoke
